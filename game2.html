<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Islands Platformer (Solvable!)</title>
    <style>
        body {
            margin: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 4px solid #fff;
            background: #87CEEB;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .instructions {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="instructions">
        <p>Use <strong>LEFT / RIGHT ARROWS</strong> to Move | Press <strong>SPACEBAR</strong> or <strong>UP ARROW</strong> to Jump</p>
        <p>Every jump is now 100% mathematically possible!</p>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME VARIABLES ---
const gravity = 0.6;
let score = 0;
let gameOver = false;

// Player Object
const player = {
    x: 100,
    y: 100,
    width: 40,
    height: 40,
    vx: 0,
    vy: 0,
    speed: 6,
    jumpForce: 12,
    isGrounded: false
};

// Platforms Array
let platforms = [];

// --- INPUTS ---
const keys = { right: false, left: false };

window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'ArrowLeft') keys.left = true;
    if ((e.code === 'Space' || e.code === 'ArrowUp')) {
        if (player.isGrounded && !gameOver) {
            player.vy = -player.jumpForce;
            player.isGrounded = false;
        }
        if (gameOver) resetGame();
    }
});

window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'ArrowLeft') keys.left = false;
});

// --- MATHEMATICALLY GUARANTEED LEVEL GENERATION ---
function generatePlatform(lastPlat) {
    const minWidth = 100;
    const maxWidth = 200;
    const width = Math.random() * (maxWidth - minWidth) + minWidth;
    
    // 1. Calculate a safe height change relative to the last platform
    // Max step up: -60px (well below player's ~120px max vertical reach)
    // Max step down: +80px
    let changeY = (Math.random() * 140) - 60; 
    let y = lastPlat.y + changeY;

    // Constrain absolute heights so platforms don't go off the top or bottom screens
    if (y < 130) y = 130;
    if (y > 320) y = 320;
    
    // Recalculate true changeY after clamping
    changeY = y - lastPlat.y;

    // 2. Adjust maximum allowed gap based on height change
    let maxGap = 140; // Default flat gap (Player max speed allows up to ~240, so this is comfortable)
    
    if (changeY < 0) {
        // If jumping UP, make the gap smaller the higher they have to go
        maxGap = 90; 
    } else {
        // If jumping DOWN, gravity helps, so the gap can be slightly wider
        maxGap = 170;
    }

    const minGap = 50;
    const gap = Math.random() * (maxGap - minGap) + minGap;

    platforms.push({
        x: lastPlat.x + lastPlat.width + gap,
        y: y,
        width: width,
        height: 20
    });
}

function initLevel() {
    platforms = [];
    // Safe starter platform right under the player
    const basePlat = { x: 50, y: 280, width: 220, height: 20 };
    platforms.push(basePlat);
    
    // Chain-generate the initial set of platforms relative to one another
    for (let i = 0; i < 5; i++) {
        generatePlatform(platforms[platforms.length - 1]);
    }
}

// --- GAME LOGIC ---
function update() {
    if (gameOver) return;

    // Horizontal Movement
    if (keys.right) player.vx = player.speed;
    else if (keys.left) player.vx = -player.speed;
    else player.vx = 0;

    player.x += player.vx;

    // Camera Scrolling (Keep player centered horizontally)
    if (player.x > canvas.width / 2) {
        const offset = player.x - (canvas.width / 2);
        player.x = canvas.width / 2;
        
        platforms.forEach(plat => plat.x -= offset);
        score += Math.floor(offset / 10);
    }

    // Stop player from running off left edge
    if (player.x < 0) player.x = 0;

    // Apply Gravity
    player.vy += gravity;
    player.y += player.vy;
    player.isGrounded = false;

    // Platform Collisions
    platforms.forEach(plat => {
        if (player.x < plat.x + plat.width && 
            player.x + player.width > plat.x &&
            player.y < plat.y + plat.height && 
            player.y + player.height > plat.y) {
            
            // Only land if moving downwards and above the platform lip
            if (player.vy > 0 && player.y + player.height - player.vy <= plat.y + 10) {
                player.y = plat.y - player.height;
                player.vy = 0;
                player.isGrounded = true;
            }
        }
    });

    // Generate new platform as the furthest one scrolls into view
    const lastPlat = platforms[platforms.length - 1];
    if (lastPlat.x < canvas.width + 100) {
        generatePlatform(lastPlat);
    }

    // Performance clean up for offscreen left platforms
    if (platforms[0].x + platforms[0].width < -200) {
        platforms.shift();
    }

    // Death Condition
    if (player.y > canvas.height) {
        gameOver = true;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Platforms (Floating Islands with a simple layered look)
    platforms.forEach(plat => {
        // Grass top
        ctx.fillStyle = '#34a853';
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        // Dirt bottom
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(plat.x, plat.y + 6, plat.width, plat.height + 14);
    });

    // Draw Player
    ctx.fillStyle = '#ff4757';
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // Draw Score
    ctx.fillStyle = 'black';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText(`Distance: ${score}`, 20, 40);

    // Game Over Overlay
    if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = 'white';
        ctx.font = '40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('YOU FELL!', canvas.width / 2, canvas.height / 2 - 10);
        
        ctx.font = '20px sans-serif';
        ctx.fillText('Press SPACEBAR to Restart', canvas.width / 2, canvas.height / 2 + 30);
        ctx.textAlign = 'start';
    }
}

function resetGame() {
    score = 0;
    gameOver = false;
    player.x = 100;
    player.y = 100;
    player.vy = 0;
    player.vx = 0;
    initLevel();
}

// Start Game Loop
initLevel();
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
