<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Islands Platformer</title>
    <style>
        body {
            margin: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 4px solid #fff;
            background: #87CEEB; /* Light blue sky */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .instructions {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="instructions">
        <p>Use <strong>LEFT / RIGHT ARROWS</strong> to Move | Press <strong>SPACEBAR</strong> or <strong>UP ARROW</strong> to Jump</p>
        <p>Don't fall into the void!</p>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME VARIABLES ---
const gravity = 0.6;
let score = 0;
let gameOver = false;
let cameraX = 0;

// Player Object
const player = {
    x: 100,
    y: 100,
    width: 40,
    height: 40,
    vx: 0,
    vy: 0,
    speed: 6,
    jumpForce: 12,
    isGrounded: false
};

// Platforms Array
let platforms = [];

// --- INPUTS ---
const keys = {
    right: false,
    left: false,
    up: false
};

window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'ArrowLeft') keys.left = true;
    if ((e.code === 'Space' || e.code === 'ArrowUp')) {
        if (player.isGrounded && !gameOver) {
            player.vy = -player.jumpForce;
            player.isGrounded = false;
        }
        if (gameOver) resetGame();
    }
});

window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'ArrowLeft') keys.left = false;
});

// --- LEVEL GENERATION ---
function generatePlatform(startX) {
    const minWidth = 80;
    const maxWidth = 200;
    const gap = Math.random() * 80 + 40; // Gap between platforms
    const width = Math.random() * (maxWidth - minWidth) + minWidth;
    
    // Random height between 150 and 350
    const y = Math.random() * 200 + 150; 

    platforms.push({
        x: startX + gap,
        y: y,
        width: width,
        height: 20
    });
}

function initLevel() {
    platforms = [];
    // Starting platform right underneath the player
    platforms.push({ x: 50, y: 300, width: 200, height: 20 });
    
    // Generate initial platforms
    let lastX = 250;
    for (let i = 0; i < 5; i++) {
        generatePlatform(lastX);
        lastX = platforms[platforms.length - 1].x + platforms[platforms.length - 1].width;
    }
}

// --- GAME LOGIC ---
function update() {
    if (gameOver) return;

    // Horizontal Movement
    if (keys.right) player.vx = player.speed;
    else if (keys.left) player.vx = -player.speed;
    else player.vx = 0;

    player.x += player.vx;

    // Camera Scrolling (Push platforms back if player goes past center)
    if (player.x > canvas.width / 2) {
        const offset = player.x - (canvas.width / 2);
        player.x = canvas.width / 2; // Keep player in middle
        
        // Move all platforms left
        platforms.forEach(plat => plat.x -= offset);
        
        // Increase score based on distance traveled
        score += Math.floor(offset / 10);
    }

    // Block player from going off the left edge of the screen
    if (player.x < 0) player.x = 0;

    // Apply Gravity
    player.vy += gravity;
    player.y += player.vy;
    player.isGrounded = false;

    // Platform Collisions
    platforms.forEach(plat => {
        // Simple AABB Collision Detection
        if (player.x < plat.x + plat.width && 
            player.x + player.width > plat.x &&
            player.y < plat.y + plat.height && 
            player.y + player.height > plat.y) {
            
            // Only land if falling downwards onto the platform
            if (player.vy > 0 && player.y + player.height - player.vy <= plat.y + 10) {
                player.y = plat.y - player.height;
                player.vy = 0;
                player.isGrounded = true;
            }
        }
    });

    // Generate new platforms as old ones go off screen
    const lastPlat = platforms[platforms.length - 1];
    if (lastPlat.x < canvas.width + 100) {
        generatePlatform(lastPlat.x + lastPlat.width);
    }

    // Clean up platforms that have gone too far left
    if (platforms[0].x + platforms[0].width < -200) {
        platforms.shift();
    }

    // Death Condition (Falling off screen)
    if (player.y > canvas.height) {
        gameOver = true;
    }
}

function draw() {
    // Clear Canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Platforms (Floating Islands)
    ctx.fillStyle = '#34a853'; // Grass color
    platforms.forEach(plat => {
        // Draw grass top
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        // Draw dirt bottom
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(plat.x, plat.y + 5, plat.width, plat.height + 15);
        ctx.fillStyle = '#34a853'; // reset to grass
    });

    // Draw Player
    ctx.fillStyle = '#ff4757';
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // Draw Score
    ctx.fillStyle = 'black';
    ctx.font = '24px sans-serif';
    ctx.fillText(`Distance: ${score}`, 20, 40);

    // Game Over Overlay
    if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = 'white';
        ctx.font = '40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('YOU FELL!', canvas.width / 2, canvas.height / 2 - 10);
        
        ctx.font = '20px sans-serif';
        ctx.fillText('Press SPACEBAR to Restart', canvas.width / 2, canvas.height / 2 + 30);
        ctx.textAlign = 'start';
    }
}

function resetGame() {
    score = 0;
    gameOver = false;
    player.x = 100;
    player.y = 100;
    player.vy = 0;
    player.vx = 0;
    initLevel();
}

// Start Game
initLevel();
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
