<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cloud Parkour Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #aaccff; /* Soft pastel sky blue */
            font-family: sans-serif;
        }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #333;
            border-radius: 50%;
            z-index: 10;
        }
        #menu {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(40, 50, 70, 0.75);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            cursor: pointer;
        }
        #ui {
            position: absolute;
            bottom: 20px; left: 20px;
            color: white;
            font-family: monospace;
            font-size: 24px;
            text-shadow: 2px 2px #333;
            z-index: 10;
        }
        h1 { font-size: 44px; margin-bottom: 10px; text-shadow: 2px 2px #222; }
        p { font-size: 18px; margin-top: 0; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">SPEED: <span id="speedo">0</span> u/s</div>
    
    <div id="menu">
        <h1>CLOUD HOPPER</h1>
        <p>Click anywhere to start jumping</p>
        <p style="font-size: 14px; color: #ddd;">WASD to Move | SPACE to Jump | Mouse to Look</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- 1. SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xaaccff); 
scene.fog = new THREE.FogExp2(0xaaccff, 0.015); // Fog makes transitions look smooth

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Smooth, bright lighting for a clean cloud look
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(40, 80, 40);
scene.add(dirLight);

// --- 2. FLOATIER PHYSICS CONSTANTS (SLOWER SPEED) ---
const playerHeight = 1.8;
let velocity = new THREE.Vector3();
let isGrounded = false;
let gameStarted = false;

// Slower tuning values
const GROUND_ACCEL = 0.04;    // Cut down from 0.12 (Much slower startup)
const GROUND_FRICTION = 0.80; // Smooth braking
const AIR_ACCEL = 0.015;      // Slower air drift control
const JUMP_FORCE = 0.22;      // Lowered to match the softer gravity
const GRAVITY = 0.008;        // Floatier, slower downward fall
const AIR_SPEED_LIMIT = 0.07; // Caps straight line air speeds tightly

const pitchObject = new THREE.Object3D();
pitchObject.add(camera);
const yawObject = new THREE.Object3D();
yawObject.position.set(0, playerHeight, 0);
yawObject.add(pitchObject);
scene.add(yawObject);

const keys = { w: false, a: false, s: false, d: false, space: false };

document.addEventListener('keydown', (e) => {
    if (e.code === 'KeyW') keys.w = true;
    if (e.code === 'KeyA') keys.a = true;
    if (e.code === 'KeyS') keys.s = true;
    if (e.code === 'KeyD') keys.d = true;
    if (e.code === 'Space') keys.space = true;
});
document.addEventListener('keyup', (e) => {
    if (e.code === 'KeyW') keys.w = false;
    if (e.code === 'KeyA') keys.a = false;
    if (e.code === 'KeyS') keys.s = false;
    if (e.code === 'KeyD') keys.d = false;
    if (e.code === 'Space') keys.space = false;
});

// --- 3. MOUSE CAPTURE ---
const menu = document.getElementById('menu');
const speedo = document.getElementById('speedo');

menu.addEventListener('click', () => document.body.requestPointerLock());
document.pointerLockElement = null;
document.addEventListener('pointerlockchange', () => {
    gameStarted = document.pointerLockElement === document.body;
    menu.style.display = gameStarted ? 'none' : 'flex';
});

document.addEventListener('mousemove', (e) => {
    if (!gameStarted) return;
    yawObject.rotation.y -= (e.movementX || 0) * 0.002;
    pitchObject.rotation.x -= (e.movementY || 0) * 0.002;
    pitchObject.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitchObject.rotation.x));
});

// --- 4. PROCEDURAL CLOUD PLATFORM GENERATOR ---
const platforms = [];

function addCloudPlatform(x, y, z, width, depth) {
    const cloudGroup = new THREE.Group();
    const cloudMat = new THREE.MeshLambertMaterial({ 
        color: 0xffffff, 
        roughness: 0.9,
        flatShading: true // Gives a cool low-poly stylized cloud look
    });

    // Generate clusters of overlapping spheres to shape a cloud
    const sphereCount = Math.floor((width * depth) / 3) + 5;
    
    for (let i = 0; i < sphereCount; i++) {
        // Vary the sizes of the cloud puffs
        const radius = 1.0 + Math.random() * 1.2;
        const geo = new THREE.SphereGeometry(radius, 8, 8);
        const mesh = new THREE.Mesh(geo, cloudMat);

        // Spread them across the platform scale bounds
        const offsetX = (Math.random() - 0.5) * (width - 1.5);
        const offsetZ = (Math.random() - 0.5) * (depth - 1.5);
        // Keep the top layer relatively unified so walking feels level
        const offsetY = (Math.random() - 0.6) * 0.5;

        mesh.position.set(offsetX, offsetY, offsetZ);
        cloudGroup.add(mesh);
    }

    cloudGroup.position.set(x, y, z);
    scene.add(cloudGroup);

    // Save accurate flat boundary boxes for smooth clipping/physics
    platforms.push({ 
        minX: x - width/2, maxX: x + width/2, 
        minZ: z - depth/2, maxZ: z + depth/2, 
        topY: y + 0.4 // Accurate step position right on top of puffs
    });
}

// Map Layout - Much larger surfaces (e.g. 14x14) and safe comfortable gaps
addCloudPlatform(0, 0, 0, 15, 15);         // Huge starting zone
addCloudPlatform(0, 0.5, -16, 12, 12);     // Straight forward, big target
addCloudPlatform(12, 1.5, -28, 10, 10);    // Diagonal right
addCloudPlatform(26, 2.0, -28, 11, 11);    // Level path gap
addCloudPlatform(26, 3.0, -12, 10, 10);    // Turn backward-left
addCloudPlatform(10, 4.0, -4, 12, 12);     // High cloud climb
addCloudPlatform(-4, 5.0, -4, 14, 14);     // Final massive golden cloud platform

function resetPlayer() {
    yawObject.position.set(0, playerHeight, 0);
    velocity.set(0,0,0);
}

// --- 5. LOOP AND ENGINE RUNNER ---
function animate() {
    requestAnimationFrame(animate);

    if (gameStarted) {
        let wishDir = new THREE.Vector3();
        if (keys.w) wishDir.z -= 1;
        if (keys.s) wishDir.z += 1;
        if (keys.a) wishDir.x -= 1;
        if (keys.d) wishDir.x += 1;
        wishDir.normalize();
        wishDir.applyQuaternion(yawObject.quaternion);

        if (isGrounded) {
            velocity.x *= GROUND_FRICTION;
            velocity.z *= GROUND_FRICTION;

            if (wishDir.lengthSq() > 0) {
                velocity.x += wishDir.x * GROUND_ACCEL;
                velocity.z += wishDir.z * GROUND_ACCEL;
            }

            if (keys.space) {
                velocity.y = JUMP_FORCE;
                isGrounded = false;
            }
        } else {
            // Air logic preserves vector momentum but lets you turn slowly
            if (wishDir.lengthSq() > 0) {
                const currentSpdProj = velocity.x * wishDir.x + velocity.z * wishDir.z;
                if (currentSpdProj < AIR_SPEED_LIMIT) {
                    velocity.x += wishDir.x * AIR_ACCEL;
                    velocity.z += wishDir.z * AIR_ACCEL;
                }
            }
        }

        // Apply custom slow gravity loop
        velocity.y -= GRAVITY;
        yawObject.position.add(velocity);

        // Ground check
        let wasGroundedThisFrame = false;
        for (let p of platforms) {
            if (yawObject.position.x > p.minX && yawObject.position.x < p.maxX &&
                yawObject.position.z > p.minZ && yawObject.position.z < p.maxZ) {
                
                const feetY = yawObject.position.y - playerHeight;
                if (velocity.y <= 0 && feetY <= p.topY && feetY > p.topY - 0.8) {
                    velocity.y = 0;
                    yawObject.position.y = p.topY + playerHeight;
                    wasGroundedThisFrame = true;
                }
            }
        }
        isGrounded = wasGroundedThisFrame;

        // Reset if you fall past clouds into space
        if (yawObject.position.y < -20) resetPlayer();

        // Speed UI display
        const horizSpeed = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z) * 1000;
        speedo.innerText = Math.round(horizSpeed);
    }

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
