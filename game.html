<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>zmii4ka</title>
    <style>
        body { background-color: #333; color: white; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        canvas { border: 2px solid white; background-color: black; margin-top: 10px; }
        .controls { margin-top: 10px; }
        button { padding: 8px 16px; font-size: 12px; cursor: pointer; }
        a { color: #00e5ff; display: block; margin-top: 10px; text-decoration: none; }
    </style>
</head>
<body>
    <h1 id="score">Резултат: 0</h1>

    <div class="controls">
        <button onclick="togglePause()">ПАУЗА / ПУСНИ</button>
        <button onclick="window.location.href='index.html'">Назад</button>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        let snake = [{x: 10, y: 10}];
        let dx = 1, dy = 0;
        let food = {x: 12, y: 12};
        let foodColor = "red";
        let score = 0, paused = false;

        function getRandomColor() {
            // Генерираме по-светли цветове (стойности от 128 до 255 за R, G и B)
            const r = Math.floor(Math.random() * 128) + 128;
            const g = Math.floor(Math.random() * 128) + 128;
            const b = Math.floor(Math.random() * 128) + 128;
            return `rgb(${r}, ${g}, ${b})`;
        }

        function togglePause() { paused = !paused; }

        function draw() {
            if (paused) return;

            let head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Проверка за удар в стена или в себе си
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 ||
                snake.some(part => part.x === head.x && part.y === head.y)) {
                snake = [{x: 10, y: 10}]; dx = 1; dy = 0; score = 0;
                scoreEl.innerText = "Резултат: 0";
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = "Резултат: " + score;
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
                foodColor = getRandomColor();
            } else {
                snake.pop();
            }

            // Рендиране
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = foodColor;
            ctx.fillRect(food.x * 20, food.y * 20, 18, 18);
            ctx.fillStyle = "#00e5ff";
            snake.forEach(part => ctx.fillRect(part.x * 20, part.y * 20, 18, 18));
        }

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; }
            else if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; }
            else if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; }
            else if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; }
        });

        setInterval(draw, 100);
    </script>
</body>
</html>
