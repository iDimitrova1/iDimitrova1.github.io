<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body { background: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        canvas { border: 2px solid #00e5ff; background: #000; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1, dy = 0;

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 400, 400);

            // Рисуване на храна
            ctx.fillStyle = "red";
            ctx.fillRect(food.x * 20, food.y * 20, 18, 18);

            // Рисуване на змия
            ctx.fillStyle = "#00e5ff";
            snake.forEach(part => ctx.fillRect(part.x * 20, part.y * 20, 18, 18));

            // Логика за движение
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
            } else {
                snake.pop();
            }

            if(head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
                snake = [{x: 10, y: 10}]; dx = 1; dy = 0;
            }
        }

        document.addEventListener("keydown", (e) => {
            if(e.key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; }
            if(e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; }
            if(e.key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; }
            if(e.key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; }
        });

        setInterval(draw, 100);
    </script>
</body>
</html>
