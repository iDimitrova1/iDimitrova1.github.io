<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body { background: #121212; color: #00e5ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        canvas { border: 2px solid #00e5ff; background: #000; }
        .ui { margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="ui">
        <h2 id="score">Резултат: 0</h2>
        <button onclick="togglePause()">ПАУЗА / ПУСНИ</button>
        <br><br>
        ___ALLOWED_HTML_0___
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1, dy = 0, score = 0, paused = false;

        function togglePause() { paused = !paused; }

        function draw() {
            if (paused) return;

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 400, 400);

            ctx.fillStyle = "red";
            ctx.fillRect(food.x * 20, food.y * 20, 18, 18);

            ctx.fillStyle = "#00e5ff";
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = "Резултат: " + score;
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
            } else {
                snake.pop();
            }

            snake.forEach(part => ctx.fillRect(part.x * 20, part.y * 20, 18, 18));

            if(head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
                snake = [{x: 10, y: 10}]; dx = 1; dy = 0; score = 0; scoreEl.innerText = "Резултат: 0";
            }
        }

        document.addEventListener("keydown", (e) => {
            if(e.key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; }
            if(e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; }
            if(e.key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; }
            if(e.key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; }
        });

        setInterval(draw, 100);
    </script>
</body>
</html>
