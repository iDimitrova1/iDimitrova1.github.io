<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>zmii4ka</title>
    <style>
        canvas { border: 2px solid white; display: block; margin: 20px auto; background-color: black; }
        body { background-color: #333; color: white; text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>
    <h1>Игра Змия</h1>
    <h2 id="score">Резултат: 0</h2>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        let snake = [{x: 10, y: 10}];
        let dx = 1;
        let dy = 0;
        let food = {x: 15, y: 15};
        let foodColor = "red";
        let score = 0;
        let paused = false;

        // Функция за генериране на случаен Hex цвят
        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function draw() {
            if (paused) return;

            // Фон
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 400, 400);

            // Рисуване на храна
            ctx.fillStyle = foodColor;
            ctx.fillRect(food.x * 20, food.y * 20, 18, 18);

            // Движение на змията
            ctx.fillStyle = "#00e5ff";
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // Проверка за ядене
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = "Резултат: " + score;
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
                foodColor = getRandomColor(); // Променяме цвета!
            } else {
                snake.pop();
            }

            // Рисуване на змията
            ctx.fillStyle = "#00e5ff";
            snake.forEach(part => ctx.fillRect(part.x * 20, part.y * 20, 18, 18));
        }

        // Управление
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; }
            if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; }
            if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; }
            if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; }
        });

        setInterval(draw, 100);
    </script>
</body>
</html>
