<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cloud Parkour Game</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>
   
        <<div id="score-ui" style="
    position: absolute; 
    top: 20px; 
    left: 20px; 
    font-family: sans-serif; 
    font-size: 20px; 
    line-height: 1.6; 
    z-index: 10000;
    /* The 50% transparent black rectangle */
    background-color: rgba(0, 0, 0, 0.5); 
    /* Padding creates clean space around the text inside the box */
    padding: 12px 20px; 
    /* Smooth rounded corners for a modern gaming HUD look */
    border-radius: 6px;
    /* Clean subtle outline to make the box stand out from the sky */
    border: 1px solid rgba(255, 255, 255, 0.1);
">
    <div style="color: #ffffff !important; font-weight: bold;">Score: <span id="score">0</span></div>
    <div style="color: #60a5fa !important;">Previous Run: <span id="prev-score">0</span></div>
    <div style="color: #00ff00 !important;">Best Score: <span id="best-score">0</span></div>
</div>
         
    <div id="crosshair"></div>
    <div id="ui">SPEED: <span id="speedo">0</span> u/s</div>
    
    <div id="menu">
        <h1>CLOUD HOPPER</h1>
        <p>Click anywhere to start jumping</p>
        <p style="font-size: 14px; color: #ddd;">WASD to Move | SPACE to Jump | Mouse to Look</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="js/input.js"></script>
    <script src="js/world.js"></script>
    <script src="js/viewmodel.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
